name: GWP Stocks — Bot Setup (manual)
on:
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node setup-bot.js
        working-directory: bots/stocks
        env:
          STOCKS_TG_TOKEN: ${{ secrets.STOCKS_TG_TOKEN }}
          STOCKS_CHAT_ID: ${{ secrets.STOCKS_CHAT_ID }}
          TWELVE_DATA_KEYS: ${{ secrets.TWELVE_DATA_KEYS }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
