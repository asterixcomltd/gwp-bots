name: GWP Forex — Scan
on:
  schedule:
    # v1.1.4 FIX: was identical to crypto-scan's '*/15 * * * *' — both
    # bots' scans queued at the exact same round minute (:00/:15/:30/:45),
    # which is the most congested slot for GitHub Actions' shared cron
    # scheduler and a real contributor to delayed runs (see engine.js's
    # new ENTRY_DRIFT_MAX_ATR gate for the other half of that fix).
    # Staggered 5 minutes off crypto; stocks-scan is separately offset
    # by 7 minutes (7-59/15).
    - cron: '5-59/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: gwp-forex-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node strategy.js
        working-directory: bots/forex
        env:
          FOREX_TG_TOKEN: ${{ secrets.FOREX_TG_TOKEN }}
          FOREX_CHAT_ID: ${{ secrets.FOREX_CHAT_ID }}
          FOREX_TWELVE_DATA_KEYS: ${{ secrets.FOREX_TWELVE_DATA_KEYS }}
          TWELVE_DATA_KEYS: ${{ secrets.TWELVE_DATA_KEYS }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
      - name: Commit updated state/log files (race-safe)
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/forex/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "GWP Forex: scan update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed (likely a race with another bot's commit) — retrying..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
