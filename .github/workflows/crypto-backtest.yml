name: GWP Crypto — Backtest
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated symbols (blank = all configured symbols)'
        required: false
        default: ''
      days:
        description: 'Days of history to backtest'
        required: false
        default: '360'
      test_flags:
        description: 'Optional experimental config overrides, comma-separated KEY=VALUE (e.g. NEAR_ZONE_USE_WICK=true,POC_PROMINENCE_MIN_RATIO=1.2). Leave blank for normal/default backtest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Apply test_flags (if any) to the job environment
        if: ${{ github.event.inputs.test_flags != '' }}
        run: |
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.test_flags }}"
          for pair in "${PAIRS[@]}"; do
            key="${pair%%=*}"
            val="${pair#*=}"
            key="$(echo "$key" | xargs)"
            val="$(echo "$val" | xargs)"
            if [ -n "$key" ]; then
              echo "$key=$val" >> "$GITHUB_ENV"
              echo "Set $key=$val for this run"
            fi
          done
      - run: node backtest.js "${{ github.event.inputs.symbols }}" "${{ github.event.inputs.days || '360' }}"
        working-directory: bots/crypto
        env:
          CRYPTO_TG_TOKEN: ${{ secrets.CRYPTO_TG_TOKEN }}
          CRYPTO_CHAT_ID: ${{ secrets.CRYPTO_CHAT_ID }}
          BACKTEST_NOTIFY: 'true'
      - name: Commit backtest report (race-safe)
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/crypto/*.json bots/crypto/*.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "GWP Crypto: weekly backtest report [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed (likely a race with another bot's commit) — retrying..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
