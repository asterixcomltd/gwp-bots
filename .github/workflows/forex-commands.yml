name: GWP Forex — Commands
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: gwp-forex-commands
  cancel-in-progress: false

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node commands.js
        working-directory: bots/forex
        env:
          FOREX_TG_TOKEN: ${{ secrets.FOREX_TG_TOKEN }}
          FOREX_CHAT_ID: ${{ secrets.FOREX_CHAT_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
      - name: Commit offset file
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/forex/tg-offset.json
          git diff --cached --quiet || git commit -m "GWP Forex: command offset update [skip ci]"
          git push
