name: GWP — Keepalive
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Touch keepalive file
        run: |
          mkdir -p .github
          date -u +"Last keepalive commit: %Y-%m-%dT%H:%M:%SZ" > .github/KEEPALIVE.md
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/KEEPALIVE.md
          git diff --cached --quiet || git commit -m "chore: weekly keepalive [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed — retrying..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
