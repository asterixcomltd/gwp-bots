# ════════════════════════════════════════════════════════════════════
# GWP KEEPALIVE — prevents GitHub's 60-day scheduled-workflow auto-disable
#
# WHY THIS EXISTS:
#   GitHub automatically disables ALL scheduled (cron) workflows in a
#   public repo once 60 consecutive days pass with no repo activity
#   (commits/PRs/issues). Source: https://docs.github.com/en/actions/
#   managing-workflow-runs/disabling-and-enabling-a-workflow
#
#   This is almost certainly the real reason signals stopped after the
#   repo sat idle — NOT an expired subscription. The crypto/forex/stocks
#   workflows already push a state commit most scans, which counts as
#   activity, but if the repo goes quiet for any stretch (holidays, an
#   API outage, all three bots finding "no state changes" for a while),
#   the 60-day countdown can still complete. This workflow guarantees a
#   commit at least every 30 days regardless of bot behavior, so the
#   countdown is never allowed to reach 60.
#
# NOTE: this workflow itself would ALSO get auto-disabled if the repo
#   ever goes fully silent for 60 days AND this workflow never got a
#   chance to run in that window before disablement. If Actions has
#   already been disabled by GitHub (banner in the Actions tab: "This
#   scheduled workflow is disabled because there hasn't been activity
#   in this repository for at least 60 days"), you must click
#   "Enable workflow" ONCE, manually, per workflow — no code fix can do
#   that first re-enable for you. After that one click, this workflow
#   keeps it from ever happening again.
# ════════════════════════════════════════════════════════════════════

name: GWP Keepalive

on:
  schedule:
    # Every 30 days — well under GitHub's 60-day inactivity threshold
    - cron: "0 6 1,15 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gwp-keepalive
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Heartbeat commit
        run: |
          git config user.email "gwp-keepalive@asterixcom.ltd"
          git config user.name  "GWP Keepalive"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          mkdir -p .keepalive
          echo "Last heartbeat: $(date -u +%Y-%m-%dT%H:%MZ)" > .keepalive/last-run.txt
          git add .keepalive/last-run.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit (unexpected but harmless)."
            exit 0
          fi
          git commit -m "chore: keepalive heartbeat $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push origin main
          echo "✅ Heartbeat committed — repo activity clock reset."
