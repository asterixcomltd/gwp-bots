name: GWP Forex — Backtest
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated symbols (blank = all configured symbols)'
        required: false
        default: ''
      days:
        description: 'Days of history to backtest'
        required: false
        default: '360'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node backtest.js "${{ github.event.inputs.symbols }}" "${{ github.event.inputs.days || '360' }}"
        working-directory: bots/forex
        env:
          FOREX_TG_TOKEN: ${{ secrets.FOREX_TG_TOKEN }}
          FOREX_CHAT_ID: ${{ secrets.FOREX_CHAT_ID }}
          BACKTEST_NOTIFY: 'true'
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
      - name: Commit backtest report (race-safe)
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/forex/*.json bots/forex/*.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "GWP Forex: weekly backtest report [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed (likely a race with another bot's commit) — retrying..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
