name: GWP Forex Bot v2.2

on:
  schedule:
    # Every 30 minutes — minimum safe for Twelve Data free tier (8 req/min)
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "scan"
        type: choice
        options: [scan, daily, weekly, health]

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Forex Bot
        env:
          FOREX_TG_TOKEN:  ${{ secrets.FOREX_TG_TOKEN }}
          FOREX_CHAT_ID:   ${{ secrets.FOREX_CHAT_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          EMAIL_USER:      ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:      ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          EMAIL_CC:        ${{ secrets.EMAIL_CC }}
        run: node forex/bot.js ${{ github.event.inputs.mode || 'scan' }}

      - name: Commit updated state
        run: |
          git config user.name  "gwp-bot[actions]"
          git config user.email "gwp-bot@users.noreply.github.com"
          git add forex/state.json
          git diff --staged --quiet || git commit -m "chore: forex state [skip ci]"
          git push
