name: GWP Crypto — Weekly Summary
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node weekly-summary.js
        working-directory: bots/crypto
        env:
          CRYPTO_TG_TOKEN: ${{ secrets.CRYPTO_TG_TOKEN }}
          CRYPTO_CHAT_ID: ${{ secrets.CRYPTO_CHAT_ID }}
      - name: Commit equity curve (race-safe)
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/crypto/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "GWP Crypto: weekly equity curve update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "Push attempt $i failed (likely a race with another bot's commit) — retrying..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
