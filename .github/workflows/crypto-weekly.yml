name: GWP Crypto — Weekly Summary
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node weekly-summary.js
        working-directory: bots/crypto
        env:
          CRYPTO_TG_TOKEN: ${{ secrets.CRYPTO_TG_TOKEN }}
          CRYPTO_CHAT_ID: ${{ secrets.CRYPTO_CHAT_ID }}
      - name: Commit equity curve
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/crypto/equity-curve.json
          git diff --cached --quiet || git commit -m "GWP Crypto: weekly equity curve update [skip ci]"
          git push
