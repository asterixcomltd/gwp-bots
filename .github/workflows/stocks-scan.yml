name: GWP Stocks — Scan
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: gwp-stocks-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: node strategy.js
        working-directory: bots/stocks
        env:
          STOCKS_TG_TOKEN: ${{ secrets.STOCKS_TG_TOKEN }}
          STOCKS_CHAT_ID: ${{ secrets.STOCKS_CHAT_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
      - name: Commit updated state/log files
        run: |
          git config user.name "gwp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bots/stocks/state.json bots/stocks/signals.log.json bots/stocks/diag.log.json bots/stocks/open-positions.json bots/stocks/pending-alerts.json
          git diff --cached --quiet || git commit -m "GWP Stocks: scan update [skip ci]"
          git push
