# ════════════════════════════════════════════════════════════════════
# GWP CRYPTO BOT v3.0 — GitHub Actions Workflow
# Pairs  : DEXE · UNI · SUSHI · SOL · AVAX · BTC · ETH · LINK · ARB · INJ
# Engine : KuCoin Public REST — no auth key needed
# © 2026 Asterix.COM Ltd. / Abdin
#
# v3.0 CHANGES vs v8.3:
#   ✅ Bot: D1 bias fixed (aligned=+6, counter=−4)
#   ✅ Bot: LIQ SWEEP duplicate removed from single signal format
#   ✅ Bot: D1 bias note now shows ✅ or ⚠️ CT context
#   ✅ Bot: firedDir lock prevents opposite-direction signals same scan
#   ✅ Bot: httpGet 15s timeout — no more KuCoin hangs
#   ✅ Bot: Promise.all() parallel TF fetches — ~4× faster scan
#   ✅ YML: Node.js 22 confirmed (Node 20 deprecated on GitHub Actions)
#
# v8.3 CHANGES vs v8.2:
#   ✅ FIX: "Save state to repo" completely rewritten
#           — Root cause of exit-128 failures: git pull --rebase was
#             crashing with a fatal git error (exit 128) in GitHub's
#             default -eo pipefail shell, aborting the entire step.
#           — NEW strategy: explicit GITHUB_TOKEN in remote URL +
#             fetch+reset (instead of pull+rebase) eliminates all
#             rebase conflicts and auth failures.
#           — Bot files saved to /tmp BEFORE reset, then restored.
#             Single clean push — no retry loop needed.
#   ✅ FIX: This is the reason TP1 HIT was repeating every 30 min —
#           state with tp1hit:true was never committed to repo, so
#           each fresh container started with tp1hit:false again.
#   ✅ CONFIRMED: Node.js 22 (not deprecated 20).
#
# v8.2 CHANGES vs v8.1:
#   ✅ FIX: actions/checkout@v4  → actions/checkout@v5
#   ✅ FIX: actions/setup-node@v4 → actions/setup-node@v5
#
# v8.1 CHANGES vs v8.0:
#   ✅ FIX: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true (superseded by v8.2)
#
# v8.0 CHANGES vs v7.0:
#   ✅ NEW: Publishes crypto_signals.json to public GitHub Gist after scan
#   ✅ NEW: crypto_signals.json committed to repo as permanent backup
#   ✅ FIX: Gist step skipped gracefully if GH_PAT / GIST_ID secrets absent
# ════════════════════════════════════════════════════════════════════

name: GWP Crypto Bot v3.0

on:
  schedule:
    # ── Regular scans — every 30 min, staggered from forex bot ──────────
    - cron: '15,45 * * * *'
    # ── Daily summary — 08:02 UTC every day ─────────────────────────────
    - cron: '2 8 * * *'
    # ── Weekly summary — Monday 08:07 UTC ────────────────────────────────
    - cron: '7 8 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scan / daily / weekly / health'
        required: false
        default: 'scan'

permissions:
  contents: write

concurrency:
  group: gwp-crypto
  cancel-in-progress: false

jobs:
  run-crypto-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js 22 ───────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # ── 3. Determine run mode ───────────────────────────────────────────
      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
            echo "▶ Manual dispatch: mode=${{ github.event.inputs.mode }}"

          elif [ "${{ github.event.schedule }}" = "7 8 * * 1" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
            echo "▶ Weekly summary triggered (Monday 08:07 UTC)"

          elif [ "${{ github.event.schedule }}" = "2 8 * * *" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
            echo "▶ Daily summary triggered (08:02 UTC)"

          else
            echo "MODE=scan" >> $GITHUB_ENV
            echo "▶ Scan triggered (15 or 45 past the hour)"
          fi

      # ── 4. Run the bot ──────────────────────────────────────────────────
      - name: Run GWP Crypto Bot
        env:
          CRYPTO_TG_TOKEN: ${{ secrets.CRYPTO_TG_TOKEN }}
          CRYPTO_CHAT_ID:  ${{ secrets.CRYPTO_CHAT_ID }}
        run: |
          echo "Running in mode: ${{ env.MODE }}"
          node crypto_bot.js ${{ env.MODE }}

      # ── 5. Publish crypto_signals.json to public Gist ─────────────────
      # Required secrets: GH_PAT (gist + repo scope) + GIST_ID (public gist ID)
      - name: Publish signals to Gist
        if: env.MODE == 'scan'
        env:
          GH_PAT:  ${{ secrets.GH_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ -z "$GH_PAT" ] || [ -z "$GIST_ID" ]; then
            echo "⚠️  GH_PAT or GIST_ID not set — skipping Gist publish"
            exit 0
          fi
          if [ ! -f crypto_signals.json ]; then
            echo "[]" > crypto_signals.json
            echo "ℹ️  Created empty crypto_signals.json placeholder"
          fi
          PAYLOAD=$(python3 -c "import json; data=open('crypto_signals.json').read(); print(json.dumps({'files': {'crypto_signals.json': {'content': data}}}))")
          HTTP=$(curl -s -o /tmp/gr.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: token $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/gists/$GIST_ID")
          if [ "$HTTP" = "200" ]; then
            echo "✅ crypto_signals.json → Gist updated (HTTP 200)"
          else
            echo "⚠️  Gist update HTTP $HTTP"; cat /tmp/gr.json
            echo "💡 If HTTP 401: GH_PAT is missing the 'gist' OAuth scope."
          fi

      # ── 6. Persist state + signals to repo ─────────────────────────────
      # v8.3 FIX: Replaced pull+rebase with fetch+reset strategy.
      # The old approach crashed with exit 128 (git fatal error in -eo pipefail
      # shell) when rebase conflicted or auth was ambiguous, which prevented
      # crypto_state.json from ever being committed — causing TP1 HIT to repeat
      # every 30 min (fresh container = stale state from repo = tp1hit:false).
      - name: Save state to repo
        run: |
          git config user.email "gwp-crypto@asterixcom.ltd"
          git config user.name  "GWP Crypto Bot"

          # Explicit token auth in remote URL — eliminates all auth-related
          # exit-128 failures regardless of how checkout configured credentials
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Save bot output files BEFORE touching the working tree
          cp crypto_state.json   /tmp/bot_crypto_state.json   2>/dev/null || true
          cp crypto_signals.json /tmp/bot_crypto_signals.json 2>/dev/null || true

          # Pull latest remote without rebase — no conflicts possible
          git fetch origin main --quiet
          git reset --hard origin/main

          # Restore bot output on top of latest remote tree
          cp /tmp/bot_crypto_state.json   crypto_state.json   2>/dev/null || true
          cp /tmp/bot_crypto_signals.json crypto_signals.json 2>/dev/null || true

          # Stage only the json files we care about
          git add crypto_state.json crypto_signals.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅ No state changes — nothing to commit."
            exit 0
          fi

          git commit -m "state(crypto): $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push origin main
          echo "✅ State committed and pushed successfully."
