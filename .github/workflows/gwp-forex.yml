# ════════════════════════════════════════════════════════════════════
# GWP FOREX BOT v3.0 — GitHub Actions Workflow
# Pairs  : XAU/USD · EUR/USD · GBP/USD · USD/JPY · GBP/JPY
# Engine : Twelve Data REST API (TWELVE_DATA_KEY required)
# © 2026 Asterix.COM Ltd. / Abdin
#
# v3.0 CHANGES vs v8.0:
#   ✅ FIX: D1 bias was BACKWARDS — now aligned=+6, counter=−4
#   ✅ FIX: LIQ SWEEP shown twice in single signal — removed ms.label
#   ✅ FIX: D1 bias note now shows ✅ or ⚠️ CT context
#   ✅ FIX: firedDir lock — no opposite-direction signals same scan
#   ✅ SPEED: httpGet 15s timeout (prevents hanging on slow API)
#   ✅ Node.js 22 (Node 20 deprecated on GitHub Actions)
# ════════════════════════════════════════════════════════════════════

name: GWP Forex Bot v3.0

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "3 8 * * *"
    - cron: "8 8 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: scan / daily / weekly / health"
        required: false
        default: "scan"

permissions:
  contents: write

concurrency:
  group: gwp-forex
  cancel-in-progress: false

jobs:
  run-forex-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "8 8 * * 1" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "3 8 * * *" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
          else
            echo "MODE=scan" >> $GITHUB_ENV
          fi

      - name: Run GWP Forex Bot
        env:
          FOREX_TG_TOKEN:   ${{ secrets.FOREX_TG_TOKEN }}
          FOREX_CHAT_ID:    ${{ secrets.FOREX_CHAT_ID }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
        run: node forex_bot.js ${{ env.MODE }}

      - name: Publish signals to Gist
        if: env.MODE == 'scan'
        env:
          GH_PAT:  ${{ secrets.GH_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ -z "$GH_PAT" ] || [ -z "$GIST_ID" ]; then
            echo "⚠️  GH_PAT or GIST_ID not set — skipping Gist publish"
            exit 0
          fi
          if [ ! -f forex_signals.json ]; then echo "[]" > forex_signals.json; fi
          PAYLOAD=$(python3 -c "import json; data=open('forex_signals.json').read(); print(json.dumps({'files': {'forex_signals.json': {'content': data}}}))")
          HTTP=$(curl -s -o /tmp/gr.json -w "%{http_code}" -X PATCH \
            -H "Authorization: token $GH_PAT" -H "Content-Type: application/json" \
            -d "$PAYLOAD" "https://api.github.com/gists/$GIST_ID")
          [ "$HTTP" = "200" ] && echo "✅ forex_signals.json → Gist updated" || { echo "⚠️  Gist HTTP $HTTP"; cat /tmp/gr.json; }

      - name: Save state to repo
        run: |
          git config user.email "gwp-forex@asterixcom.ltd"
          git config user.name  "GWP Forex Bot"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          cp forex_state.json   /tmp/bot_forex_state.json   2>/dev/null || true
          cp forex_signals.json /tmp/bot_forex_signals.json 2>/dev/null || true
          git fetch origin main --quiet
          git reset --hard origin/main
          cp /tmp/bot_forex_state.json   forex_state.json   2>/dev/null || true
          cp /tmp/bot_forex_signals.json forex_signals.json 2>/dev/null || true
          git add forex_state.json forex_signals.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ No state changes."; exit 0
          fi
          git commit -m "state(forex): $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push origin main
          echo "✅ State saved."
