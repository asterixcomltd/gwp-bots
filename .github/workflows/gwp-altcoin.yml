name: GWP Altcoin Bot v3.0

on:
  schedule:
    - cron: '15,45 * * * *'
    - cron: '2 8 * * *'
    - cron: '7 8 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'scan / daily / weekly / health'
        required: false
        default: 'scan'

permissions:
  contents: write

jobs:
  run-altcoin-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
            exit 0
          fi
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] && [ "$HOUR" = "08" ] && [ "$MIN" -ge "6" ] && [ "$MIN" -le "11" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
            exit 0
          fi
          if [ "$HOUR" = "08" ] && [ "$MIN" -lt "10" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
            exit 0
          fi
          echo "MODE=scan" >> $GITHUB_ENV

      - name: Run GWP Altcoin Bot
        env:
          ALTCOIN_TG_TOKEN: ${{ secrets.ALTCOIN_TG_TOKEN }}
          ALTCOIN_CHAT_ID:  ${{ secrets.ALTCOIN_CHAT_ID }}
        run: node altcoin_bot.js $MODE

      - name: Save state to repo
        run: |
          git config user.email "gwp-altcoin@asterixcom.ltd"
          git config user.name "GWP Altcoin Bot"
          git add altcoin_state.json
          git diff --staged --quiet || git commit -m "state(altcoin): $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push || true