# ════════════════════════════════════════════════════════════════════
# GWP ALTCOIN BOT v8.0 — GitHub Actions Workflow
# Pairs  : DEXE · UNI · SUSHI · SOL · AVAX · BTC · ETH · LINK · ARB · INJ
# Engine : KuCoin Public REST — no auth key needed
# © 2026 Asterix.COM Ltd. / Abdin
#
# v8.0 CHANGES vs v7.0:
#   ✅ NEW: Publishes altcoin_signals.json to public GitHub Gist after scan
#           → Vercel dashboard reads Gist raw URL. NO Google Sheet needed.
#   ✅ NEW: altcoin_signals.json also committed to repo as permanent backup
#   ✅ FIX: actions/checkout@v4 + setup-node@v4
#   ✅ FIX: Gist step skipped gracefully if GH_PAT / GIST_ID secrets absent
#   ✅ FIX: python3 -c collapsed to single line (multi-line broke YAML parser)
#   ✅ FIX: git pull --rebase before commit (prevents push conflicts)
#   ✅ FIX: git add uses safe guard (|| true) for state file
# ════════════════════════════════════════════════════════════════════

name: GWP Altcoin Bot v8.0

on:
  schedule:
    # ── Regular scans — every 30 min, staggered from forex bot ──────────
    - cron: '15,45 * * * *'
    # ── Daily summary — 08:02 UTC every day ─────────────────────────────
    - cron: '2 8 * * *'
    # ── Weekly summary — Monday 08:07 UTC ────────────────────────────────
    - cron: '7 8 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scan / daily / weekly / health'
        required: false
        default: 'scan'

permissions:
  contents: write

concurrency:
  group: gwp-altcoin
  cancel-in-progress: false

jobs:
  run-altcoin-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Node.js 22 ───────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Determine run mode ───────────────────────────────────────────
      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
            echo "▶ Manual dispatch: mode=${{ github.event.inputs.mode }}"

          elif [ "${{ github.event.schedule }}" = "7 8 * * 1" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
            echo "▶ Weekly summary triggered (Monday 08:07 UTC)"

          elif [ "${{ github.event.schedule }}" = "2 8 * * *" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
            echo "▶ Daily summary triggered (08:02 UTC)"

          else
            echo "MODE=scan" >> $GITHUB_ENV
            echo "▶ Scan triggered (15 or 45 past the hour)"
          fi

      # ── 4. Run the bot ──────────────────────────────────────────────────
      - name: Run GWP Altcoin Bot
        env:
          ALTCOIN_TG_TOKEN: ${{ secrets.ALTCOIN_TG_TOKEN }}
          ALTCOIN_CHAT_ID:  ${{ secrets.ALTCOIN_CHAT_ID }}
        run: |
          echo "Running in mode: ${{ env.MODE }}"
          node altcoin_bot.js ${{ env.MODE }}

      # ── 5. Publish altcoin_signals.json to public Gist ─────────────────
      # Required secrets: GH_PAT (gist + repo scope) + GIST_ID (public gist ID)
      # FIX v8.0: Always ensure the file exists (write [] if missing) so the
      # Gist is always updated even when no signals fired this scan.
      - name: Publish signals to Gist
        if: env.MODE == 'scan'
        env:
          GH_PAT:  ${{ secrets.GH_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ -z "$GH_PAT" ] || [ -z "$GIST_ID" ]; then
            echo "⚠️  GH_PAT or GIST_ID not set — skipping Gist publish"
            exit 0
          fi
          if [ ! -f altcoin_signals.json ]; then
            echo "[]" > altcoin_signals.json
            echo "ℹ️  Created empty altcoin_signals.json placeholder"
          fi
          PAYLOAD=$(python3 -c "import json; data=open('altcoin_signals.json').read(); print(json.dumps({'files': {'altcoin_signals.json': {'content': data}}}))")
          HTTP=$(curl -s -o /tmp/gr.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: token $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/gists/$GIST_ID")
          if [ "$HTTP" = "200" ]; then
            echo "✅ altcoin_signals.json → Gist updated (HTTP 200)"
          else
            echo "⚠️  Gist update HTTP $HTTP"; cat /tmp/gr.json
            echo ""; echo "💡 If HTTP 401: GH_PAT is missing the 'gist' OAuth scope."
            echo "   Go to GitHub → Settings → Developer settings → Personal access tokens"
            echo "   → Regenerate token and check the 'gist' checkbox."
          fi

      # ── 6. Persist state + signals to repo ─────────────────────────────
      - name: Save state to repo
        run: |
          git config user.email "gwp-altcoin@asterixcom.ltd"
          git config user.name  "GWP Altcoin Bot"
          git pull --rebase
          [ -f altcoin_state.json ]   && git add altcoin_state.json   || true
          [ -f altcoin_signals.json ] && git add altcoin_signals.json || true

          if git diff --staged --quiet; then
            echo "No state changes — nothing to commit."
            exit 0
          fi

          git commit -m "state(altcoin): $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}..."
            git pull --rebase && git push && exit 0
            echo "  Failed — waiting $((attempt * 10))s before retry..."
            sleep $((attempt * 10))
          done

          echo "❌ All 3 push attempts failed."
          exit 1
