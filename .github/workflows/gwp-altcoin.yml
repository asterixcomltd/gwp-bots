# ════════════════════════════════════════════════════════════════════
# GWP ALTCOIN BOT v6.0 — GitHub Actions Workflow
# Pairs  : DEXE · UNI · SUSHI · SOL · AVAX · BTC · ETH
# Engine : KuCoin Public REST — no auth key needed
# © 2026 Asterix.COM Ltd. / Abdin
#
# FIXES vs v3.0:
#   ✅ FIX: actions/checkout@v5 + setup-node@v5  (kills Node 20 warning)
#   ✅ FIX: Mode detection uses github.event.schedule, NOT runtime clock
#          — runtime clock was fragile: queue delays caused wrong mode,
#            and overlapping scan/daily cron windows caused misidentification
#   ✅ FIX: git push with pull --rebase retry — silent state loss eliminated
#   ✅ FIX: concurrency group — prevents simultaneous runs from creating
#            git conflicts or firing duplicate signals
#   ✅ FIX: timeout-minutes raised to 15 (7 pairs × 3 TFs, retries)
#   ✅ FIX: ${{ env.MODE }} used instead of bare $MODE for safe expression eval
#   ✅ FIX: Workflow name updated to v6.0 to match bot version
# ════════════════════════════════════════════════════════════════════

name: GWP Altcoin Bot v6.0

on:
  schedule:
    # ── Regular scans — every 30 min, staggered from forex bot ──────────
    - cron: '15,45 * * * *'
    # ── Daily summary — 08:02 UTC every day ─────────────────────────────
    - cron: '2 8 * * *'
    # ── Weekly summary — Monday 08:07 UTC ────────────────────────────────
    - cron: '7 8 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scan / daily / weekly / health'
        required: false
        default: 'scan'

permissions:
  contents: write

# Prevents two runs from overlapping and causing git state conflicts
# or firing duplicate signals. A queued run waits; it is NOT cancelled.
concurrency:
  group: gwp-altcoin
  cancel-in-progress: false

jobs:
  run-altcoin-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── 2. Node.js 22 ───────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # ── 3. Determine run mode ───────────────────────────────────────────
      # Uses github.event.schedule — the EXACT cron string that triggered
      # this run — instead of checking the runtime clock.
      # Runtime clock was unreliable: runner queue delays could shift
      # MIN outside the detection window, causing daily/weekly to fall
      # through to scan. Also, the forex scan cron '0,30 * * * *' fires
      # at 08:00 (same minute as the daily cron), so clock-based detection
      # would misidentify those scan triggers as daily — duplicating summaries.
      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
            echo "▶ Manual dispatch: mode=${{ github.event.inputs.mode }}"

          elif [ "${{ github.event.schedule }}" = "7 8 * * 1" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
            echo "▶ Weekly summary triggered (Monday 08:07 UTC)"

          elif [ "${{ github.event.schedule }}" = "2 8 * * *" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
            echo "▶ Daily summary triggered (08:02 UTC)"

          else
            echo "MODE=scan" >> $GITHUB_ENV
            echo "▶ Scan triggered (15 or 45 past the hour)"
          fi

      # ── 4. Run the bot ──────────────────────────────────────────────────
      - name: Run GWP Altcoin Bot
        env:
          ALTCOIN_TG_TOKEN: ${{ secrets.ALTCOIN_TG_TOKEN }}
          ALTCOIN_CHAT_ID:  ${{ secrets.ALTCOIN_CHAT_ID }}
        run: |
          echo "Running in mode: ${{ env.MODE }}"
          node altcoin_bot.js ${{ env.MODE }}

      # ── 5. Persist state ────────────────────────────────────────────────
      # Retries pull --rebase + push up to 3 times.
      # The concurrency group above makes concurrent push conflicts nearly
      # impossible, but this retry loop is defence-in-depth for workflow_dispatch
      # triggers that can still race with a scheduled run that beat it to push.
      - name: Save state to repo
        run: |
          git config user.email "gwp-altcoin@asterixcom.ltd"
          git config user.name  "GWP Altcoin Bot"
          git add altcoin_state.json

          if git diff --staged --quiet; then
            echo "No state changes — nothing to commit."
            exit 0
          fi

          git commit -m "state(altcoin): $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}..."
            git pull --rebase && git push && exit 0
            echo "  Failed — waiting $((attempt * 10))s before retry..."
            sleep $((attempt * 10))
          done

          echo "❌ All 3 push attempts failed. State may not be saved."
          exit 1
